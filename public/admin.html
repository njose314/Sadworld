<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SADWORLD — ADMIN CONTROL PANEL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
:root{--g:#00FF41;--gd:#00b32d;--gb:rgba(0,255,65,.3);--g2:rgba(0,255,65,.07);--bg:#0D0208;--red:#FF3333;--mono:'Share Tech Mono',monospace;--disp:'VT323',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:var(--mono);font-size:12px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:9999;}
#login-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;}
#admin-logo{font-family:var(--disp);font-size:52px;color:var(--g);text-shadow:0 0 12px var(--g);letter-spacing:.1em;}
.form-group{display:flex;flex-direction:column;gap:6px;width:300px;}
label{font-size:10px;color:var(--gd);letter-spacing:.2em;text-transform:uppercase;}
input{background:transparent;border:1px solid var(--gb);border-bottom:1px solid var(--g);color:var(--g);font-family:var(--mono);font-size:13px;padding:8px 10px;outline:none;caret-color:var(--g);}
input:focus{border-color:var(--g);}
input::placeholder{color:rgba(0,255,65,.2);}
.btn{background:transparent;border:1px solid var(--g);color:var(--g);font-family:var(--mono);font-size:11px;padding:10px;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--g2);}
.btn.red{border-color:rgba(255,51,51,.6);color:var(--red);}
.btn.red:hover{background:rgba(255,51,51,.08);}
.btn.small{padding:3px 10px;font-size:10px;}
#err{color:var(--red);font-size:11px;min-height:14px;text-shadow:0 0 5px var(--red);}
#panel{display:none;padding:20px;}
#panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--gb);}
#panel-title{font-family:var(--disp);font-size:36px;color:var(--g);text-shadow:0 0 8px var(--g);}
#status-bar{font-size:10px;color:var(--gd);}
.search-row{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.search-row input{flex:1;max-width:300px;}
#action-log{background:rgba(0,0,0,.6);border:1px solid var(--gb);padding:8px 12px;font-size:10px;color:var(--gd);margin-bottom:14px;min-height:28px;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--gb);}
th{text-align:left;font-size:10px;color:var(--gd);letter-spacing:.15em;padding:6px 8px;text-transform:uppercase;font-weight:normal;}
td{padding:6px 8px;font-size:11px;border-bottom:1px solid rgba(0,255,65,.07);vertical-align:middle;}
tr:hover td{background:var(--g2);}
.banned-row td{color:rgba(255,51,51,.6);}
.balance-input{background:transparent;border:1px solid var(--gb);color:var(--g);font-family:var(--mono);font-size:11px;padding:3px 6px;width:90px;outline:none;}
.balance-input:focus{border-color:var(--g);}
.action-cell{display:flex;gap:5px;flex-wrap:wrap;}
.props-cell{font-size:9px;color:var(--gd);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--gb);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-panel">
  <div id="admin-logo">ADMIN CONTROL</div>
  <div style="font-size:10px;color:rgba(0,255,65,.35);letter-spacing:.3em;margin-bottom:8px">AI CORPORATION INTERNAL TOOLS</div>
  <div class="form-group">
    <label>Admin Employee ID</label>
    <input id="a-user" type="text" placeholder="ADMIN" autocomplete="off"/>
    <label>Access Code</label>
    <input id="a-pass" type="password" placeholder="••••••••" autocomplete="off"/>
    <div id="err"></div>
    <button class="btn" onclick="doAdminLogin()">AUTHENTICATE</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div id="panel-header">
    <div id="panel-title">AI CORP CONTROL PANEL</div>
    <div id="status-bar">ADMIN SESSION ACTIVE</div>
  </div>
  <div id="action-log">// Action log ready.</div>
  <div class="search-row">
    <input id="search-q" type="text" placeholder="Search Employee ID..." autocomplete="off" oninput="fetchPlayers()"/>
    <button class="btn small" onclick="fetchPlayers()">SCAN</button>
    <button class="btn small" onclick="fetchPlayers(true)">REFRESH ALL</button>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Employee ID</th><th>Balance (SC)</th><th>Lvl</th><th>Status</th><th>Props</th><th>Actions</th>
      </tr></thead>
      <tbody id="player-table"></tbody>
    </table>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let isAdminAuth = false;

socket.on('connect',()=>{});

function doAdminLogin(){
  const u=document.getElementById('a-user').value.trim();
  const p=document.getElementById('a-pass').value;
  document.getElementById('err').textContent='';
  socket.emit('login',{username:u,password:p});
}
document.getElementById('a-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});

socket.on('login_ok',data=>{
  if(!data.isAdmin){ document.getElementById('err').textContent='Access denied. Not an admin account.'; return; }
  isAdminAuth=true;
  document.getElementById('login-panel').style.display='none';
  document.getElementById('panel').style.display='block';
  document.getElementById('status-bar').textContent=`ADMIN: ${data.player.username} | Session active`;
  fetchPlayers();
});

socket.on('auth_error',msg=>{ document.getElementById('err').textContent=msg; });
socket.on('banned',msg=>{ document.getElementById('err').textContent=msg; });

function fetchPlayers(all){
  const q=all?'':document.getElementById('search-q').value.trim();
  socket.emit('admin_get_players',{search:q});
}

socket.on('admin_players',players=>{
  const tbody=document.getElementById('player-table');
  tbody.innerHTML='';
  players.forEach(p=>{
    const tr=document.createElement('tr');
    if(p.is_banned) tr.className='banned-row';
    tr.innerHTML=`
      <td>${p.username}${p.is_admin?'<span style="color:rgba(0,255,65,.4);font-size:9px"> [ADMIN]</span>':''}${p.is_dead?'<span style="color:rgba(255,51,51,.5);font-size:9px"> [DEAD]</span>':''}</td>
      <td>${Number(p.sadcoins).toLocaleString()}</td>
      <td>${p.job_level}</td>
      <td>${p.is_banned?'<span style="color:rgba(255,51,51,.7)">BANNED</span>':'<span style="color:rgba(0,255,65,.5)">ACTIVE</span>'}</td>
      <td class="props-cell">${(p.props||[]).join(', ')||'—'}</td>
      <td class="action-cell">
        ${!p.is_admin?`
          <input class="balance-input" id="bal-${p.id}" type="number" placeholder="±SC" title="Enter amount to add or subtract (use negative)"/>
          <button class="btn small" onclick="modBalance('${p.id}')">APPLY</button>
          ${p.is_banned
            ?`<button class="btn small" onclick="unbanPlayer('${p.id}')">UNBAN</button>`
            :`<button class="btn small red" onclick="promptBan('${p.id}','${p.username}')">BAN</button>`
          }
        `:'<span style="color:rgba(0,255,65,.2);font-size:9px">PROTECTED</span>'}
      </td>
    `;
    tbody.appendChild(tr);
  });
  log(`Loaded ${players.length} player records.`);
});

function modBalance(id){
  const inp=document.getElementById(`bal-${id}`);
  const amt=parseInt(inp.value);
  if(isNaN(amt)){log('ERROR: Enter a valid number (positive or negative).',true);return;}
  socket.emit('admin_modify_balance',{targetId:id,amount:amt});
  inp.value='';
}

function promptBan(id,username){
  const reason=prompt(`Ban reason for ${username}:`, 'Violation of compliance policy.');
  if(reason===null) return;
  if(confirm(`PERMANENTLY BAN AND DELETE ${username}? This cannot be undone.`)){
    socket.emit('admin_ban_player',{targetId:id,reason});
  }
}

function unbanPlayer(id){
  socket.emit('admin_unban_player',{targetId:id});
}

socket.on('admin_action_ok',data=>{ log(data.msg); });
socket.on('admin_error',msg=>{ log('ERROR: '+msg,true); });

function log(msg,isErr){
  const el=document.getElementById('action-log');
  el.textContent='// '+msg;
  el.style.color=isErr?'rgba(255,51,51,.8)':'rgba(0,255,65,.5)';
}
</script>
</body>
</html>
